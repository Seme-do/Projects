<!DOCTYPE html>
<html>
    <head>
        <title>
            Facebook
        </title>
        <style>        
            .login-button{
                width: 260px;
                padding: 10px;
                background-color: black;
                color: white;
                border: none;
                border-radius: 55px;
                cursor: pointer;
            }
            .email-card,
            .passwword-card{
                width: 220px;
                padding: 10px;
                border-radius: 5px;
                border: 1px solid #ccc;
                padding-left: 30px;
            }
            .span-text{
                color: black;
            }
            .Google-option{
                display: flex;
                border-radius: 10px;
                padding-right: 88px;
                background-color: rgb(250, 242, 242);
                padding-bottom: 5px;
                padding-top: 5px;
                font-size: 14px;
                align-items: center;
                width: 260px;
                border: 1px solid #ccc;
                cursor: pointer;
            }
            .Facebook-option{
                display: flex;
                margin-top: 10px;
                border-radius: 10px;
                padding-right: 70px;
                width: 240px;
                background-color: rgb(250, 242, 242);
                padding-bottom: 5px;
                padding-top: 5px;
                width: 260px;
                align-items: center;
                border: 1px solid #ccc;
                cursor: pointer;
            }
            .X-option{
                display: flex;
                margin-top: 10px;
                border-radius: 10px;
                padding-right: 120px;
                width: 260px;
                background-color: rgb(250, 242, 242);
                padding-bottom: 5px;
                padding-top: 5px;
                align-items: center;
                border: 1px solid #ccc;
                cursor: pointer;
            }
            .Apple-option{
                display: flex;
                margin-top: 10px;
                border-radius: 10px;
                width: 260px;
                padding-right: 90px;
                background-color: rgb(250, 242, 242);
                padding-bottom: 5px;
                padding-top: 5px;
                align-items: center;
                border: 1px solid #ccc;
                cursor: pointer;
            }
            .terms-text{
                color: rgb(120, 75, 202);
                font-family: Arial;
                margin: 0;
                font-size: 15px;
                margin-bottom: 30px;
                margin-left: 25px;
            }
            .Password-text{
                color: rgb(120, 75, 202);
                font-family:  Arial;
            }
            .and-text{
                color: black;
                font-family:  Arial;
            }
            .account-text{
                color: black;
                font-family: Arial;
            }
            .sign-in{
                font-size: 24px;
                font-weight: bold;
                margin-bottom: 10px;
            }
            .login-container{
                margin-left: 100px;
                border: 1px solid #e0e0e0;
                border-radius: 20px;
                max-width: 300px;
                margin: 50px auto;
                width: 90%;
                background-color: #fff;
                padding-left: 65px;
            }
            .Google-logo{
                width: 20px;
                height: 20px;
                border-radius: 10px;
            }
            .facebook-logo{
                width: 20px;
                height: 20px;
                border-radius: 10px;
            }
            .X-logo{
                width: 20px;
                height: 20px;
                border-radius: 20px;
            }
            .apple-logo{
                width: 20px;
                height: 20px;
                border-radius: 10px;
            }
            .facebook-description{
                color: black;
                padding-left: 5px;
            }
            .X-description{
                color: black;
                padding-left: 5px;
            }
            .apple-description{
                color: black;
                padding-left: 5px;
            }
            .google-btn{
                color: black;
                padding-left: 5px;
            }
            .email-image{
                height: 16px;
                width: 18px;
                margin-left: 4px;
                position: absolute;
            }
            .password-image{
                width: 16px;
                height: 16px;
                position: absolute;
                margin-left: 4px;
                margin-top: 1px;
            }
            .divider{
                display: flex;
                align-items: center;
                gap: 10px;
                margin: 16px 0;
                margin-left: -5px;
                max-width: 250px;
            }
            .divider::before,
            .divider::after{
                content: '';
                flex: 1;
                height: 1px;
                background-color: #ccc;
            }
            Body{
                background-color: #e8e8e8;
                align-items: center;
            }
             .email-input{
                display: flex;
                align-items: center;
            }
            .password-input{
                display: flex;
                align-items: center;
                margin-top: 10px;
            }
            .eye-image{
                width: 20px;
                height: 22px;
                position: absolute;
                margin-left: 235px;
                margin-top: 1px;
            }
            .user-text{
                color: rgb(120, 75, 202);
                font-family: Arial;
            }
            .terms-text{
                 color: black;
                font-family: Arial;
                margin: 0;
                font-size: 12px;
                margin-bottom: 30px;
                margin-left: 10px;
                margin-top: 15px;
            }
            .span-text{
                color: rgb(120, 75, 202);
                font-family: Arial;
                margin: 0;
                font-size: 13px;
                margin-bottom: 30px;
                margin-left: 20px;
            }
        </style>
    </head>
    <body>
        <div class="login-container">
     <p class="sign-in">
        Sign in
     </p>
      <p>
            New user? <span class="user-text">Create an account</span>
        </p>
     <div class="email-input">
        <img src="Email Icon Vector, Address, Background, Black PNG and Vector with Transparent Background for Free Download.jpg"
            class="email-image">
     <input class="email-card" type="text" placeholder="Email Address">
     </div>
      <div class="password-input">
            <img src="Lock - Free security icons.jpg" 
            class="password-image">
        <input class="passwword-card" type="text" placeholder="Password">
        <img src="Eye, vision symbol icon in line style design isolated on white background_ Editable stroke_.jpg" 
        class="eye-image">
        </div>
     <p class="Password-text">
        Forgot password?
     </p>
     <button class="login-button">
        Login
     </button>
     <div class="divider">
        <span class="divider-text">or</span>
     </div>
     <button class="Google-option">
        <img src="YouTube Google Logo Google S Google Account PNG.jpg"
         class="Google-logo">
        <span class="google-btn">Continue with Google</span> 
     </button>
     <button class="Facebook-option">
        <img src="download (7).jpg"
         class="facebook-logo">
        <span class="facebook-description">Continue with Facebook</span>
     </button>
     <button class="X-option">
        <img src="Twitter X App Icon PNG.jpg" class="X-logo">
        <span class="X-description">Continue with X</span>
     </button>
     <button class="Apple-option">
        <img src="Apple Logo PNG.jpg" class="apple-logo">
        <span class="apple-description">Continue with Apple</span>
     </button>
     <p class="terms-text">
            By signing with an account, you agree to our <span class="span-text">Terms of Service <span class="and-text">and</span> Privacy Policy</span>
        </p>
        </div>
    </body>
</html>
