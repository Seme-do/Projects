<!DOCTYPE html>
<html>
    <head>
        <title>
            Login
        </title>
        <style>
            .Google-logo,
            .Facebook-logo,
            .X-logo,
            .Apple-logo{
                width: 20px;
                height: 20px;
                border-radius: 10px;
            }
            .email-input{
                display: flex;
                align-items: center;
            }
            .password-input{
                display: flex;
                align-items: center;
                margin-top: 10px;
            }
            .email-image{
                height: 16px;
                width: 18px;
                margin-left: 4px;
                position: absolute;
            }
            .password-image{
                width: 16px;
                height: 16px;
                position: absolute;
                margin-left: 4px;
                margin-top: 1px;
            }  
            .email-card,
            .passwword-card{
                width: 200px;
                padding: 10px;
                border-radius: 5px;
                border: 1px solid #ccc;
                padding-left: 30px;
            }
            .login-button{
                width: 240px;
                padding: 10px;
                background-color: black;
                color: white;
                border: none;
                border-radius: 55px;
                cursor: pointer;
            }
            body{
                align-items: center;
                justify-content: center;
                height: 500px;
                font-family: Arial, sans-serif;
                background-color: #e8e8e8;
            }
            .login-container{
                margin-left: 100px;
                border: 1px solid #e0e0e0;
                border-radius: 20px;
                max-width: 300px;
                margin: 50px auto;
                width: 90%;
                background-color: #fff;
                padding-left: 65px;
            }
            .social-media-icons{
                display: flex;
                gap: 20px;
                margin-top: 10px;
                justify-content: center;
                margin-left: -60px;
            }
            .password-text{
                color:  rgb(120, 75, 202);
                margin-top: 10px;
                margin-bottom: 15px;
            }
            .sign-text{
                font-size: 24px;
                font-weight: bold;
                margin-bottom: 10px;
            }
            .or-text{
                text-align: center;
                margin-top: 20px;
                margin-bottom: 10px;
                margin-left: -60px;
            }
            .terms-text{
                 color: black;
                font-family: Arial;
                margin: 0;
                font-size: 13px;
                margin-bottom: 30px;
                margin-left: 5px;
                margin-top: 70px;
            }
            .span-text{
                color: rgb(120, 75, 202);
                font-family: Arial;
                margin: 0;
                font-size: 13px;
                margin-bottom: 30px;
                margin-left: 30px;
            }
            .user-text{
                color: rgb(120, 75, 202);
                font-family: Arial;
            }
            .join-text{
        
                margin-top: 20px;
                margin-bottom: 10px;
                font-size: 13px;
            }
            .divider{
                display: flex;
                align-items: center;
                gap: 10px;
                margin: 16px 0;
                margin-left: -5px;
                max-width: 250px;
            }
            .divider::before,
            .divider::after{
                content: '';
                flex: 1;
                height: 1px;
                background-color: #ccc;
            }
            .eye-image{
                width: 20px;
                height: 22px;
                position: absolute;
                margin-left: 215px;
                margin-top: 1px;
            }
            .and-text{
                color: black;
                font-family: Arial;
            }
        </style>     
    </head>
    <body>
        <Div class="login-container">
        <p class="sign-text">
            Sign in
        </p>
        <p>
            New user? <span class="user-text">Create an account</span>
        </p>
        <div class="email-input">
            <img src="Email Icon Vector, Address, Background, Black PNG and Vector with Transparent Background for Free Download.jpg" 
             class="email-image">
        <input class="email-card" type="text" placeholder="Email Address">
        </div>
        <div class="password-input">
            <img src="Lock - Free security icons.jpg" 
            class="password-image">
        <input class="passwword-card" type="text" placeholder="Password">
        <img src="Eye, vision symbol icon in line style design isolated on white background_ Editable stroke_.jpg" 
        class="eye-image">
        </div>
        <p class="password-text">
            Forgot password?
        </p>
        <button class="login-button">
            Login
        </button>
        <div class="divider">
            <span class="">or</span>
        </div>
        <p class="join-text">
            Join With Your Favorite Social Media Account
        </p>
        <div class="social-media-icons">
        <img src="YouTube Google Logo Google S Google Account PNG.jpg" class="Google-logo">
        <img src="download (7).jpg" class="Facebook-logo">
        <img src="Twitter X App Icon PNG.jpg" class="X-logo">
        <img src="Apple Logo PNG.jpg" class="Apple-logo">
        </div>
        <p class="terms-text">
            By signing with an account, you agree to our <span class="span-text">Terms of Service <span class="and-text">and</span> Privacy Policy</span>
        </p>
        </Div>       
    </body>
